<?xml version="1.0" encoding="UTF-8"?>
<svg width="1100" height="800" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill:#f4f6fb; stroke:#1e2a78; stroke-width:2; rx:8; }
    .sub { fill:#fff4d9; stroke:#d9822b; stroke-width:2; rx:8; }
    .label { font: bold 16px 'Segoe UI', sans-serif; fill:#1b1b1f; }
    .small { font: 14px 'Segoe UI', sans-serif; fill:#1b1b1f; }
    .arrow { stroke:#1e2a78; stroke-width:2; marker-end:url(#arrowhead); }
    .arrow-alt { stroke:#a02b7d; stroke-width:2; marker-end:url(#arrowhead); stroke-dasharray:6,4; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e2a78" />
    </marker>
  </defs>

  <text class="label" x="30" y="40">Development Layers</text>
  <rect class="box" x="60" y="60" width="200" height="60" />
  <text class="small" x="160" y="95" text-anchor="middle">Requirements</text>
  <rect class="box" x="290" y="60" width="230" height="60" />
  <text class="small" x="405" y="95" text-anchor="middle">Architecture & Design</text>
  <rect class="box" x="540" y="60" width="230" height="60" />
  <text class="small" x="655" y="95" text-anchor="middle">Implementation & Coding</text>
  <rect class="box" x="790" y="60" width="200" height="60" />
  <text class="small" x="890" y="95" text-anchor="middle">Testing & QA</text>
  <rect class="box" x="450" y="150" width="220" height="60" />
  <text class="small" x="560" y="185" text-anchor="middle">Deployment & Monitoring</text>

  <line class="arrow" x1="260" y1="90" x2="290" y2="90" />
  <line class="arrow" x1="520" y1="90" x2="540" y2="90" />
  <line class="arrow" x1="770" y1="90" x2="790" y2="90" />
  <line class="arrow" x1="1000" y1="90" x2="1000" y2="90" />
  <line class="arrow" x1="890" y1="120" x2="560" y2="150" />

  <text class="label" x="50" y="260">Platform Architecture</text>
  <rect class="sub" x="60" y="280" width="220" height="60" />
  <text class="small" x="170" y="315" text-anchor="middle">Legacy Excel + Macros</text>
  <rect class="sub" x="310" y="280" width="220" height="60" />
  <text class="small" x="420" y="315" text-anchor="middle">Power Automate Browser Flows</text>
  <rect class="sub" x="560" y="280" width="220" height="60" />
  <text class="small" x="670" y="315" text-anchor="middle">API-Oriented Services</text>
  <rect class="sub" x="810" y="280" width="250" height="60" />
  <text class="small" x="935" y="315" text-anchor="middle">Rules & Decisioning Engine</text>
  <rect class="sub" x="410" y="380" width="240" height="60" />
  <text class="small" x="530" y="415" text-anchor="middle">Integration & Messaging Layer</text>
  <rect class="sub" x="640" y="380" width="220" height="60" />
  <text class="small" x="750" y="415" text-anchor="middle">Telemetry & Observability</text>

  <line class="arrow" x1="280" y1="310" x2="310" y2="310" />
  <line class="arrow" x1="530" y1="310" x2="560" y2="310" />
  <line class="arrow" x1="780" y1="310" x2="810" y2="310" />
  <line class="arrow" x1="670" y1="340" x2="520" y2="380" />
  <line class="arrow" x1="780" y1="340" x2="650" y2="380" />
  <line class="arrow" x1="930" y1="340" x2="670" y2="410" />
  <line class="arrow" x1="750" y1="410" x2="560" y2="160" />
  <line class="arrow" x1="560" y1="440" x2="560" y2="210" />
</svg>
